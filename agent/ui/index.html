<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakistan Weather & AQI Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3d;
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .topbar h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .session-badge {
    font-size: 11px; color: #64748b;
    background: #1e2130; border: 1px solid #2a2d3d;
    border-radius: 6px; padding: 4px 10px; font-family: monospace;
  }
  .session-badge span { color: #3b82f6; }
  .btn-new {
    font-size: 12px; padding: 6px 14px;
    background: transparent; border: 1px solid #2a2d3d;
    border-radius: 6px; color: #94a3b8; cursor: pointer; transition: all 0.15s;
  }
  .btn-new:hover { border-color: #3b82f6; color: #3b82f6; }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; background: #1a1d27;
    border-right: 1px solid #2a2d3d;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; font-size: 11px; font-weight: 600;
    color: #475569; text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid #2a2d3d;
  }
  .query-history { flex: 1; overflow-y: auto; padding: 8px; }
  .history-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: background 0.1s; margin-bottom: 2px;
  }
  .history-item:hover { background: #1e2130; }
  .history-item.active { background: #1e2234; border: 1px solid #1e3a5f; }
  .history-query {
    font-size: 12px; color: #94a3b8;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
  .intent-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .intent-sql_only    { background: #1e3a5f; color: #60a5fa; }
  .intent-sql_and_plot{ background: #1a2e1a; color: #4ade80; }
  .intent-direct      { background: #2d2315; color: #fbbf24; }
  .history-time { font-size: 10px; color: #475569; }

  /* ── Chat area ── */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }

  /* ── Empty state ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px; padding: 40px;
  }
  .empty-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px;
  }
  .empty-state h2 { font-size: 20px; font-weight: 600; color: #f1f5f9; }
  .empty-state p { font-size: 14px; color: #64748b; text-align: center; max-width: 380px; line-height: 1.6; }
  .suggestion-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 520px;
  }
  .suggestion {
    background: #1a1d27; border: 1px solid #2a2d3d; border-radius: 10px;
    padding: 12px 14px; cursor: pointer; transition: all 0.15s; text-align: left;
  }
  .suggestion:hover { border-color: #3b82f6; background: #1a2234; }
  .suggestion-label { font-size: 11px; color: #3b82f6; font-weight: 500; margin-bottom: 4px; }
  .suggestion-text { font-size: 13px; color: #94a3b8; line-height: 1.4; }

  /* ── Message bubbles ── */
  .msg { display: flex; flex-direction: column; gap: 8px; max-width: 820px; width: 100%; margin: 0 auto; }
  .msg-user { align-self: flex-end; align-items: flex-end; }
  .msg-agent { align-items: flex-start; }
  .bubble-user {
    background: #1e3a5f; border: 1px solid #1e4a7f;
    border-radius: 12px 12px 2px 12px; padding: 10px 16px;
    font-size: 14px; color: #e2e8f0; max-width: 600px;
  }
  .bubble-agent {
    background: #1a1d27; border: 1px solid #2a2d3d;
    border-radius: 2px 12px 12px 12px; padding: 14px 18px;
    font-size: 14px; color: #e2e8f0; line-height: 1.7; width: 100%;
  }
  .cursor {
    display: inline-block; width: 2px; height: 14px;
    background: #3b82f6; margin-left: 1px; vertical-align: middle;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .msg-meta { display: flex; gap: 8px; align-items: center; padding: 0 4px; }

  /* ── Pipeline status ── */
  .pipeline-status {
    background: #1a1d27; border: 1px solid #2a2d3d;
    border-radius: 2px 12px 12px 12px; padding: 14px 18px; width: 100%;
  }
  .pipeline-title { font-size: 11px; color: #475569; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .pipeline-steps { display: flex; flex-direction: column; gap: 8px; }
  .pipeline-step {
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #475569;
  }
  .pipeline-step.active { color: #e2e8f0; }
  .pipeline-step.done { color: #4ade80; }
  .pipeline-step.error { color: #f87171; }
  .step-icon {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; background: #1e2130; border: 1px solid #2a2d3d;
  }
  .pipeline-step.active .step-icon {
    background: #1e3a5f; border-color: #3b82f6;
  }
  .pipeline-step.done .step-icon {
    background: #1a2e1a; border-color: #4ade80; color: #4ade80;
  }
  .pipeline-step.error .step-icon {
    background: #2d1515; border-color: #f87171; color: #f87171;
  }
  .spin {
    width: 14px; height: 14px;
    border: 2px solid #1e3a5f; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-label { flex: 1; }
  .step-time { font-size: 10px; color: #334155; font-family: monospace; }

  /* ── SQL block ── */
  .sql-block {
    margin-top: 12px; background: #0f1117;
    border: 1px solid #2a2d3d; border-radius: 8px; overflow: hidden;
  }
  .sql-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: #161820; border-bottom: 1px solid #2a2d3d;
    font-size: 11px; color: #475569;
  }
  .sql-header span { color: #3b82f6; font-weight: 500; }
  .copy-btn {
    background: transparent; border: none; color: #475569;
    cursor: pointer; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; transition: color 0.1s;
  }
  .copy-btn:hover { color: #94a3b8; }
  /* FIX: word-wrap for SQL */
  .sql-code {
    padding: 12px 14px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px; color: #7dd3fc;
    overflow-x: auto; white-space: pre-wrap;
    word-break: break-all; line-height: 1.6; max-width: 100%;
  }

  /* ── Stats row ── */
  .stats-row { display: flex; gap: 10px; margin-top: 12px; }
  .stat-card {
    background: #0f1117; border: 1px solid #2a2d3d;
    border-radius: 8px; padding: 10px 14px; flex: 1;
  }
  .stat-label { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #f1f5f9; }

  /* ── Data table ── */
  .data-table-wrap {
    margin-top: 12px; background: #0f1117;
    border: 1px solid #2a2d3d; border-radius: 8px; overflow: hidden;
  }
  .data-table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: #161820; border-bottom: 1px solid #2a2d3d;
    font-size: 11px; color: #475569;
  }
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    overflow-x: auto; display: block; max-height: 240px; overflow-y: auto;
  }
  .data-table th {
    padding: 8px 14px; text-align: left; color: #475569; font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    background: #161820; position: sticky; top: 0; border-bottom: 1px solid #2a2d3d;
  }
  .data-table td {
    padding: 7px 14px; color: #94a3b8;
    border-bottom: 1px solid #1e2130; font-family: monospace;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #1a1d27; color: #e2e8f0; }

  /* ── Plot ── */
  .plot-wrap {
    margin-top: 12px; background: #fff;
    border-radius: 8px; overflow: hidden; border: 1px solid #2a2d3d;
  }
  .plot-wrap img { width: 100%; display: block; }

  /* ── Error ── */
  .error-bubble {
    background: #1f0f0f; border: 1px solid #7f1d1d;
    border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #fca5a5; margin-top: 8px;
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 24px 20px; border-top: 1px solid #2a2d3d;
    background: #1a1d27; flex-shrink: 0;
  }
  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: #0f1117; border: 1px solid #2a2d3d;
    border-radius: 12px; padding: 10px 14px; transition: border-color 0.15s;
    max-width: 820px; margin: 0 auto;
  }
  .input-wrap:focus-within { border-color: #3b82f6; }
  #query-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 14px; color: #e2e8f0; resize: none; font-family: inherit;
    line-height: 1.5; max-height: 120px; min-height: 24px;
  }
  #query-input::placeholder { color: #475569; }
  .send-btn {
    width: 34px; height: 34px; background: #3b82f6; border: none;
    border-radius: 8px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s; color: white; font-size: 16px;
  }
  .send-btn:hover { background: #2563eb; }
  .send-btn:disabled { background: #1e3a5f; cursor: not-allowed; color: #475569; }
  .input-hint {
    text-align: center; font-size: 11px; color: #334155; margin-top: 8px;
    max-width: 820px; margin-left: auto; margin-right: auto;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d3d; border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🌤</div>
    <h1>Pakistan Weather & AQI Agent</h1>
  </div>
  <div class="topbar-right">
    <div class="session-badge">Session: <span id="session-display">—</span></div>
    <button class="btn-new" onclick="newSession()">+ New session</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Query history</div>
    <div class="query-history" id="query-history">
      <div style="padding:24px 12px;text-align:center;font-size:12px;color:#334155;">Queries will appear here</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-logo">🌤</div>
        <div style="text-align:center;">
          <h2>Ask anything about Pakistan weather & AQI</h2>
          <p style="margin-top:8px;">Query 328 cities worth of hourly weather and air quality data in plain English.</p>
        </div>
        <div class="suggestion-grid">
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">📊 Data</div>
            <div class="suggestion-text">Which 5 cities had the highest average temperature?</div>
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">📈 Chart</div>
            <div class="suggestion-text">Plot average temperature for Karachi over time</div>
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">🌫 AQI</div>
            <div class="suggestion-text">What is the average AQI for Lahore?</div>
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">💡 Explain</div>
            <div class="suggestion-text">What does PM2.5 mean for health?</div>
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">🏆 Ranking</div>
            <div class="suggestion-text">Which province has the worst air quality?</div>
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <div class="suggestion-label">📈 Chart</div>
            <div class="suggestion-text">Plot AQI trend for Islamabad</div>
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="query-input" rows="1" placeholder="Ask about weather or AQI data…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendQuery()">➤</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line · Session persists across queries</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let sessionId = null;
let isLoading = false;
let history = [];

// ── Pipeline steps definition ──────────────────────────────────────
const STEPS = {
  sql_only:     ['supervisor', 'sql_agent'],
  sql_and_plot: ['supervisor', 'sql_agent', 'plot_agent'],
  direct:       ['supervisor', 'direct_answer'],
};
const STEP_LABELS = {
  supervisor:     { icon: '🧭', label: 'Classifying intent' },
  sql_agent:      { icon: '🗄', label: 'Writing & executing SQL' },
  plot_agent:     { icon: '📊', label: 'Generating chart' },
  direct_answer:  { icon: '💡', label: 'Composing answer' },
};

function newSession() {
  sessionId = null;
  history = [];
  document.getElementById('session-display').textContent = '—';
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const es = document.createElement('div');
  es.className = 'empty-state';
  es.id = 'empty-state';
  es.innerHTML = document.getElementById('empty-state')?.innerHTML || '';
  msgs.appendChild(es);
  document.getElementById('query-history').innerHTML =
    '<div style="padding:24px 12px;text-align:center;font-size:12px;color:#334155;">Queries will appear here</div>';
}

function showEmptyState(show) {
  const es = document.getElementById('empty-state');
  if (es) es.style.display = show ? 'flex' : 'none';
}

function useSuggestion(el) {
  document.getElementById('query-input').value = el.querySelector('.suggestion-text').textContent;
  sendQuery();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatValue(val) {
  if (val === null || val === undefined) return '—';
  if (typeof val === 'number') return Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2);
  return String(val);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Pipeline status widget ─────────────────────────────────────────
function makePipelineWidget(intent) {
  const steps = STEPS[intent] || STEPS.sql_only;
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-agent';

  const box = document.createElement('div');
  box.className = 'pipeline-status';
  box.innerHTML = `<div class="pipeline-title">Agent pipeline</div><div class="pipeline-steps" id="pipeline-steps"></div>`;
  wrap.appendChild(box);

  const stepsEl = box.querySelector('#pipeline-steps');
  steps.forEach((s, i) => {
    const def = STEP_LABELS[s] || { icon: '⚙', label: s };
    const el = document.createElement('div');
    el.className = 'pipeline-step' + (i === 0 ? ' active' : '');
    el.id = 'step-' + s;
    el.innerHTML = `
      <div class="step-icon">${i === 0 ? '<div class="spin"></div>' : def.icon}</div>
      <span class="step-label">${def.label}</span>
      <span class="step-time" id="step-time-${s}"></span>`;
    stepsEl.appendChild(el);
  });

  return { wrap, steps, stepTimes: {} };
}

function advancePipeline(widget, completedStep, nextStep) {
  const done = document.getElementById('step-' + completedStep);
  if (done) {
    done.className = 'pipeline-step done';
    done.querySelector('.step-icon').innerHTML = '✓';
  }
  if (nextStep) {
    const next = document.getElementById('step-' + nextStep);
    if (next) {
      next.className = 'pipeline-step active';
      next.querySelector('.step-icon').innerHTML = '<div class="spin"></div>';
    }
  }
}

// ── Text streaming ─────────────────────────────────────────────────
function streamText(el, text, speed = 12) {
  return new Promise(resolve => {
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        cursor.insertAdjacentText('beforebegin', text[i]);
        i++;
      } else {
        clearInterval(interval);
        cursor.remove();
        resolve();
      }
    }, speed);
  });
}

// ── History sidebar ────────────────────────────────────────────────
function addToHistory(query, intent, idx) {
  history.push({ query, intent, idx });
  const container = document.getElementById('query-history');
  if (history.length === 1) container.innerHTML = '';
  const item = document.createElement('div');
  item.className = 'history-item';
  item.id = 'hist-' + idx;
  item.innerHTML = `
    <div class="history-query">${escHtml(query)}</div>
    <div class="history-meta">
      <span class="intent-pill intent-${intent}">${intent.replace('_', ' ')}</span>
      <span class="history-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`;
  item.onclick = () => {
    document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('msg-' + idx)?.scrollIntoView({ behavior: 'smooth' });
  };
  container.appendChild(item);
}

// ── Send query ─────────────────────────────────────────────────────
async function sendQuery() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query || isLoading) return;

  isLoading = true;
  showEmptyState(false);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const msgIdx = Date.now();
  const messages = document.getElementById('messages');

  // User bubble
  const userMsg = document.createElement('div');
  userMsg.className = 'msg msg-user';
  userMsg.id = 'msg-' + msgIdx;
  userMsg.innerHTML = `<div class="bubble-user">${escHtml(query)}</div>`;
  messages.appendChild(userMsg);
  messages.scrollTop = messages.scrollHeight;

  // Start with supervisor step visible immediately
  const widget = makePipelineWidget('sql_only'); // default, updates on response
  messages.appendChild(widget.wrap);
  messages.scrollTop = messages.scrollHeight;

  try {
    const body = { query };
    if (sessionId) body.session_id = sessionId;

    // Simulate pipeline advancement while waiting
    const timers = [];
    timers.push(setTimeout(() => advancePipeline(widget, 'supervisor', 'sql_agent'), 1200));

    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    timers.forEach(clearTimeout);

    if (!res.ok) throw new Error(data.detail || 'Request failed');

    sessionId = data.session_id;
    document.getElementById('session-display').textContent = sessionId.slice(0, 8) + '…';

    // Update pipeline to show correct steps for actual intent
    const intent = data.intent || 'sql_only';
    const correctSteps = STEPS[intent] || STEPS.sql_only;

    // Mark all steps done
    correctSteps.forEach(s => {
      const el = document.getElementById('step-' + s);
      if (el) {
        el.className = 'pipeline-step done';
        el.querySelector('.step-icon').innerHTML = '✓';
      }
    });

    // Add plot_agent step if needed but not in widget
    if (intent === 'sql_and_plot' && !document.getElementById('step-plot_agent')) {
      const stepsEl = widget.wrap.querySelector('#pipeline-steps') ||
                      widget.wrap.querySelector('.pipeline-steps');
      if (stepsEl) {
        const def = STEP_LABELS['plot_agent'];
        const el = document.createElement('div');
        el.className = 'pipeline-step done';
        el.id = 'step-plot_agent';
        el.innerHTML = `<div class="step-icon">✓</div><span class="step-label">${def.label}</span>`;
        stepsEl.appendChild(el);
      }
    }

    addToHistory(query, intent, msgIdx);

    // Render response after pipeline widget
    await renderResponse(data, messages);

  } catch (err) {
    widget.wrap.remove();
    const errMsg = document.createElement('div');
    errMsg.className = 'msg msg-agent';
    errMsg.innerHTML = `<div class="error-bubble">⚠ ${escHtml(err.message)}</div>`;
    messages.appendChild(errMsg);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  messages.scrollTop = messages.scrollHeight;
  input.focus();
}

// ── Render response ────────────────────────────────────────────────
async function renderResponse(data, messages) {
  const intentLabel = { sql_only: '📊 Data query', sql_and_plot: '📈 Data + chart', direct: '💡 Direct answer' };
  const intent = data.intent || 'sql_only';

  // Intent pill
  const metaEl = document.createElement('div');
  metaEl.className = 'msg msg-agent';
  metaEl.innerHTML = `<div class="msg-meta">
    <span class="intent-pill intent-${intent}">${intentLabel[intent] || intent}</span>
  </div>`;
  messages.appendChild(metaEl);

  // Stream the answer
  if (data.answer) {
    const answerEl = document.createElement('div');
    answerEl.className = 'msg msg-agent';
    const bubble = document.createElement('div');
    bubble.className = 'bubble-agent';
    answerEl.appendChild(bubble);
    messages.appendChild(answerEl);
    messages.scrollTop = messages.scrollHeight;
    await streamText(bubble, data.answer, 8);
    messages.scrollTop = messages.scrollHeight;
  }

  // SQL block
  if (data.sql_result?.sql) {
    const sqlEl = document.createElement('div');
    sqlEl.className = 'msg msg-agent';
    sqlEl.innerHTML = `
      <div class="sql-block">
        <div class="sql-header">
          <span>SQL</span>
          <button class="copy-btn" onclick="copySql(this)">Copy</button>
        </div>
        <div class="sql-code">${escHtml(data.sql_result.sql)}</div>
      </div>`;
    messages.appendChild(sqlEl);
  }

  // Stats + table
  if (data.sql_result) {
    const cols = data.sql_result.columns?.length || 0;
    const rowCount = data.sql_result.row_count || 0;
    const statsEl = document.createElement('div');
    statsEl.className = 'msg msg-agent';
    statsEl.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Rows returned</div><div class="stat-value">${rowCount.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Columns</div><div class="stat-value">${cols}</div></div>
      </div>`;
    messages.appendChild(statsEl);

    if (data.sql_result.rows?.length) {
      const c = data.sql_result.columns;
      const r = data.sql_result.rows;
      const tableEl = document.createElement('div');
      tableEl.className = 'msg msg-agent';
      tableEl.innerHTML = `
        <div class="data-table-wrap">
          <div class="data-table-header">
            <span>Results</span>
            <span style="color:#334155">${r.length} row${r.length !== 1 ? 's' : ''}</span>
          </div>
          <table class="data-table">
            <thead><tr>${c.map(col => `<th>${escHtml(col)}</th>`).join('')}</tr></thead>
            <tbody>${r.map(row => `<tr>${c.map(col => `<td>${escHtml(formatValue(row[col]))}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
        </div>`;
      messages.appendChild(tableEl);
    }
  }

  // Plot
  if (data.plot_b64) {
    const plotEl = document.createElement('div');
    plotEl.className = 'msg msg-agent';
    plotEl.innerHTML = `
      <div class="plot-wrap">
        <img src="data:image/png;base64,${data.plot_b64}" alt="Generated chart" />
      </div>`;
    messages.appendChild(plotEl);
  }

  // Error
  if (data.error) {
    const errEl = document.createElement('div');
    errEl.className = 'msg msg-agent';
    errEl.innerHTML = `<div class="error-bubble">⚠ ${escHtml(data.error)}</div>`;
    messages.appendChild(errEl);
  }

  messages.scrollTop = messages.scrollHeight;
}

function copySql(btn) {
  const code = btn.closest('.sql-block').querySelector('.sql-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}
</script>
